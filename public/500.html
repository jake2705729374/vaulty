<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something went wrong — Vaultly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --page:    #0A0A0F;
      --surface: #111118;
      --surf2:   #1a1a26;
      --border:  #272736;
      --accent:  #2563EB;
      --accent2: #3b82f6;
      --ink:     #f0f0f0;
      --muted:   #8b8ba7;
      --faint:   #555570;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--page);
      color: var(--ink);
      font-family: 'Sora', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 440px;
      width: 100%;
    }

    .icon-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surf2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .body-text {
      font-size: 1rem;
      line-height: 1.65;
      color: var(--muted);
      max-width: 340px;
      margin-bottom: 0.5rem;
    }

    .sub-text {
      font-size: 0.875rem;
      color: var(--faint);
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 300px;
      margin-bottom: 4rem;
    }

    @media (min-width: 480px) {
      .actions {
        flex-direction: row;
      }
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: background 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }
    .btn-primary:hover { background: var(--accent2); }

    .btn-secondary {
      background: var(--surf2);
      color: var(--ink);
      border: 1px solid var(--border);
      font-weight: 500;
    }
    .btn-secondary:hover { background: var(--border); }

    .divider {
      width: 100%;
      max-width: 300px;
      height: 1px;
      background: var(--border);
      margin-bottom: 1.5rem;
    }

    .status-block {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      background: var(--surf2);
      border: 1px solid var(--border);
      margin-bottom: 3.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--faint);
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Lock icon -->
    <div class="icon-ring">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
           stroke="#2563EB" stroke-width="1.75"
           stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1" fill="#2563EB" stroke="none"/>
      </svg>
    </div>

    <h1>Something went wrong</h1>

    <p class="body-text">
      An error occurred on our end. Your journal entries are
      AES&#8209;256 encrypted and completely unaffected.
    </p>
    <p class="sub-text">Please try again in a moment.</p>

    <!-- Actions -->
    <div class="actions">
      <a class="btn btn-primary" href="/">Return home</a>
      <button class="btn btn-secondary" onclick="window.location.reload()">Try again</button>
    </div>

    <!-- Data safety badge -->
    <div class="divider"></div>
    <div class="status-block">
      <div class="status-dot"></div>
      <span class="status-text">Your encrypted data is safe and untouched</span>
    </div>

    <p class="footer-text">Vaultly &nbsp;·&nbsp; Your thoughts, always private</p>

  </div>
</body>
</html>
